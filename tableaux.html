<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tableaux (local mock)</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #fff;
        --line: #e5e7eb;
        --text: #111827;
        --muted: #6b7280;
        --accent: #f59e0b;
        --taskW: 320px;
        --ownerW: 150px;
        --dateW: 44px;
        --zoom: 1;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Segoe UI, Arial, sans-serif; background: var(--bg); color: var(--text); }
      .wrap { padding: 12px; }
      .header {
        display: flex; align-items: center; justify-content: space-between; gap: 8px;
        border: 1px solid #fde68a; border-radius: 14px; background: #fffbeb; padding: 10px;
        flex-wrap: nowrap;
        overflow-x: auto;
      }
      .left, .right { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; white-space: nowrap; }
      .left { flex: 1 1 auto; min-width: 0; }
      .right { flex: 0 0 auto; }
      .label { font-size: 11px; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; font-weight: 700; }
      select, input, button {
        border: 1px solid var(--line); border-radius: 999px; background: #fff; color: var(--text);
        font-size: 12px; padding: 7px 10px;
      }
      button { cursor: pointer; }
      button.primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
      .project-select { flex: 1 1 360px; width: auto; min-width: 200px; max-width: 620px; }
      .status { font-size: 11px; color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: 6px 10px; }
      .legend { display: flex; align-items: center; gap: 10px; flex-wrap: nowrap; white-space: nowrap; }
      .legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: #334155; }
      .legend-dot { width: 10px; height: 10px; border-radius: 999px; display: inline-block; border: 1px solid rgba(15, 23, 42, 0.08); }

      .table-wrap {
        margin-top: 10px;
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: auto;
        background: var(--card);
        height: calc(100vh - 110px);
      }
      table { width: 100%; border-collapse: collapse; min-width: 980px; font-size: calc(12px * var(--zoom)); table-layout: fixed; }
      th, td {
        border-bottom: 1px solid #f1f5f9;
        border-right: 1px solid #f3f4f6;
        padding: calc(6px * var(--zoom));
        text-align: center;
      }
      thead th { position: sticky; top: 0; z-index: 6; }
      th { font-size: calc(10px * var(--zoom)); color: var(--muted); text-transform: uppercase; letter-spacing: .08em; background: #f8fafc; }
      th.date-col { padding: 0; position: sticky; top: 0; }
      th.date-col, td.date-td { width: calc(var(--dateW) * var(--zoom)); min-width: calc(var(--dateW) * var(--zoom)); }
      .colhdr { display: flex; flex-direction: column; gap: 2px; align-items: center; }
      .col-dow { font-size: calc(10px * var(--zoom)); font-weight: 700; color: #64748b; }
      .col-date {
        font-size: calc(10px * var(--zoom));
        font-weight: 800;
        color: #0f172a;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 999px;
        padding: calc(2px * var(--zoom)) calc(6px * var(--zoom));
      }
      .task-col { width: calc(var(--taskW) * var(--zoom)); min-width: calc(var(--taskW) * var(--zoom)); text-align: left; }
      .owner-col { width: calc(var(--ownerW) * var(--zoom)); min-width: calc(var(--ownerW) * var(--zoom)); text-align: left; }
      th.task-col, td.task-col { position: sticky; left: 0; z-index: 7; background: #fff; }
      th.owner-col, td.owner-col { position: sticky; left: calc(var(--taskW) * var(--zoom)); z-index: 7; background: #fff; }
      thead th.task-col, thead th.owner-col { background: #f8fafc; z-index: 8; }
      .rowbox { display: flex; align-items: center; gap: 6px; position: relative; }
      .toggle {
        width: calc(22px * var(--zoom));
        height: calc(22px * var(--zoom));
        border: 1px solid #d1d5db;
        border-radius: calc(6px * var(--zoom));
        background: #fff;
        font-size: calc(12px * var(--zoom));
        font-weight: 700;
        line-height: 1;
      }
      .toggle:disabled { opacity: .35; cursor: default; }
      .ghost { width: calc(22px * var(--zoom)); height: calc(22px * var(--zoom)); }
      .row-input {
        width: 100%;
        border: none;
        background: transparent;
        outline: none;
        font-size: calc(12px * var(--zoom));
        color: var(--text);
      }
      .row-actions {
        display: flex;
        gap: 4px;
        position: absolute;
        right: 2px;
        top: 50%;
        transform: translateY(-50%);
        visibility: hidden;
        background: linear-gradient(to left, rgba(255,255,255,1) 65%, rgba(255,255,255,0));
        padding-left: 14px;
      }
      tr.row-active .row-actions { visibility: visible; }
      .icon {
        width: calc(22px * var(--zoom));
        height: calc(22px * var(--zoom));
        border-radius: 999px;
        border: none;
        background: transparent;
        color: #64748b;
      }
      .icon:hover { background: #f1f5f9; color: #0f172a; }
      .icon.drag { cursor: grab; }
      .icon.drag:active { cursor: grabbing; }
      tr.drag-over > td { outline: 2px solid rgba(59, 130, 246, 0.35); outline-offset: -2px; }
      .sub { color: #334155; }
      .cell {
        width: calc(44px * var(--zoom));
        height: calc(44px * var(--zoom));
        border-radius: 999px;
        border: none;
        background: transparent;
        display: grid; place-items: center; cursor: pointer;
        outline: none;
      }
      .cell:focus { outline: none; box-shadow: none; }
      .ring {
        width: calc(36px * var(--zoom));
        height: calc(36px * var(--zoom));
        border-radius: 999px;
        display: block;
      }
      .ring svg { width: 100%; height: 100%; display: block; }
      td.cell-td { background: transparent; }
      td.cell-td.selected-td { background: rgba(245, 158, 11, 0.12); }
      td.date-td { padding: 0; text-align: center; vertical-align: middle; }
      td.date-td .cell { display: block; margin: 0 auto; }
      th.date-col .colhdr { padding: calc(6px * var(--zoom)) calc(4px * var(--zoom)); }
      tr.parent-row > td { background: rgba(59, 130, 246, 0.08); }
      tr.parent-row > td.selected-td { background: rgba(245, 158, 11, 0.12); }
      .empty { color: #94a3b8; text-align: center; padding: 20px; }

      thead th { position: sticky; top: 0; z-index: 6; }
      .resizer {
        position: absolute;
        top: 0;
        right: -2px;
        width: 8px;
        height: 100%;
        cursor: col-resize;
      }
      .resizer.left { left: -2px; right: auto; }

      .modal-backdrop {
        position: fixed; inset: 0; background: rgba(2, 6, 23, .35); display: none; place-items: center; z-index: 10;
      }
      .modal { width: min(440px, 95vw); background: #fff; border: 1px solid var(--line); border-radius: 14px; overflow: hidden; }
      .modal-head { padding: 12px 14px; border-bottom: 1px solid #f1f5f9; font-weight: 700; }
      .modal-body { padding: 12px 14px; }
      .hint { margin: 6px 0 0; font-size: 12px; color: #64748b; }
      .modal-foot { display: flex; justify-content: flex-end; gap: 8px; padding: 10px 14px; border-top: 1px solid #f1f5f9; background: #f8fafc; }

      @media print {
        body { background: #fff; }
        .table-wrap { height: auto; overflow: visible; }
        .header { overflow: hidden; flex-wrap: nowrap; }
        .left, .right { flex-wrap: nowrap !important; white-space: nowrap !important; }
        .legend { gap: 6px; }
        .legend-item { font-size: 10px; }
        #btnCreate, #btnDelete, #btnUndo, #btnRedo, #btnZoomOut, #btnZoomIn, #btnZoomReset, #btnSaveMode, #btnSave { display: none !important; }
        .resizer, .row-actions { display: none !important; }
        thead th, th.task-col, td.task-col, th.owner-col, td.owner-col { position: static !important; }
        .ring svg { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="left">
          <span class="label">Project</span>
          <select id="projectSelect" class="project-select"></select>
          <button id="btnCreate" type="button">Create</button>
          <button id="btnDelete" type="button">Delete</button>
          <span class="label">Start</span>
          <input id="startDate" type="date" />
          <span class="label">End</span>
          <input id="endDate" type="date" />
        </div>
        <div class="right">
          <div class="legend" aria-label="Legend">
            <span class="legend-item"><span class="legend-dot" style="background:#f87171"></span>Red: Require Decision</span>
            <span class="legend-item"><span class="legend-dot" style="background:#facc15"></span>Yelow: Recovery Plan</span>
            <span class="legend-item"><span class="legend-dot" style="background:#34d399"></span>Green: On schedule</span>
            <span class="legend-item"><span class="legend-dot" style="background:#111827"></span>Black: Done</span>
          </div>
          <button id="btnUndo" type="button" disabled title="Undo (Ctrl+Z)">Undo</button>
          <button id="btnRedo" type="button" disabled title="Redo (Ctrl+Y / Ctrl+Shift+Z)">Redo</button>
          <button id="btnZoomOut" type="button">−</button>
          <button id="btnZoomIn" type="button">+</button>
          <button id="btnZoomReset" type="button">100%</button>
          <button id="btnSaveMode" type="button">HTML</button>
          <button id="btnSave" class="primary" type="button">Save</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <div id="createModal" class="modal-backdrop" role="dialog" aria-modal="true">
      <div class="modal">
        <div class="modal-head">Create project</div>
        <div class="modal-body">
          <input id="newProjectName" type="text" placeholder="Project_name" style="width:100%; border-radius:10px;" />
          <div class="hint">No permitidos: espacio, <code>.</code>, <code>,</code>, <code>:</code>, <code>|</code></div>
        </div>
        <div class="modal-foot">
          <button id="btnCancelCreate" type="button">Cancel</button>
          <button id="btnConfirmCreate" class="primary" type="button">Create</button>
        </div>
      </div>
    </div>

    <script>
      const STORAGE_INDEX = 'tableaux:projects:index'
      const STORAGE_CURRENT = 'tableaux:projects:current'
      const STORAGE_PREFIX = 'tableaux:project:'
      const forbiddenName = /[.,\s:|]/

      const createMemoryStorage = () => {
        const map = new Map()
        return {
          get length() {
            return map.size
          },
          key(i) {
            return Array.from(map.keys())[i] ?? null
          },
          getItem(k) {
            const key = String(k)
            return map.has(key) ? map.get(key) : null
          },
          setItem(k, v) {
            map.set(String(k), String(v))
          },
          removeItem(k) {
            map.delete(String(k))
          },
        }
      }

      const storage = (() => {
        try {
          const t = '__tableaux_test__'
          window.localStorage.setItem(t, '1')
          window.localStorage.removeItem(t)
          return window.localStorage
        } catch {
          return createMemoryStorage()
        }
      })()

      const state = {
        projects: [],
        current: null,
        data: null,
        collapsed: {},
        dirty: false,
        history: { undo: [], redo: [] },
        editingCell: null,
        selectedCells: [],
        anchorCell: null,
        grid: { rows: [], dates: [] },
        activeRowId: null,
        zoom: 1,
      }

      const uid = () => (crypto?.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`)
      const statuses = ['red', 'yellow', 'green', 'black']
      const percents = [0, 25, 50, 75, 100]

      const todayIso = () => new Date().toISOString().slice(0, 10)
      const addDaysIso = (iso, days) => {
        const d = new Date(iso)
        d.setDate(d.getDate() + days)
        return d.toISOString().slice(0, 10)
      }
      const formatDow = (iso) => {
        const d = new Date(iso + 'T00:00:00')
        return d.toLocaleDateString('en-GB', { weekday: 'short' }).toUpperCase()
      }
      const formatDate = (iso) => {
        const d = new Date(iso + 'T00:00:00')
        return d.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit' })
      }
      const buildDates = (start, end) => {
        const out = []
        const a = new Date(start + 'T00:00:00')
        const b = new Date(end + 'T00:00:00')
        while (a <= b && out.length < 45) {
          out.push(a.toISOString().slice(0, 10))
          a.setDate(a.getDate() + 1)
        }
        return out
      }
      const ringSvg = (percent, status) => {
        const c = status === 'green' ? '#34d399' : status === 'yellow' ? '#facc15' : status === 'red' ? '#f87171' : '#111827'
        const pct = Math.max(0, Math.min(100, Number(percent) || 0))
        if (pct <= 0) return `<svg viewBox="0 0 36 36" aria-hidden="true"><circle cx="18" cy="18" r="18" fill="#e5e7eb"></circle></svg>`
        if (pct >= 100) return `<svg viewBox="0 0 36 36" aria-hidden="true"><circle cx="18" cy="18" r="18" fill="${c}"></circle></svg>`
        const a = (-90 + (pct / 100) * 360) * (Math.PI / 180)
        const x = 18 + 18 * Math.cos(a)
        const y = 18 + 18 * Math.sin(a)
        const large = pct > 50 ? 1 : 0
        return `<svg viewBox="0 0 36 36" aria-hidden="true"><circle cx="18" cy="18" r="18" fill="#e5e7eb"></circle><path d="M18 18 L18 0 A18 18 0 ${large} 1 ${x.toFixed(
          3,
        )} ${y.toFixed(3)} Z" fill="${c}"></path></svg>`
      }

      const setDirty = (v) => {
        state.dirty = v
      }

      const MAX_HISTORY = 10
      const deepClone = (v) => {
        if (typeof structuredClone === 'function') return structuredClone(v)
        return JSON.parse(JSON.stringify(v))
      }
      const snapshotState = () => ({
        data: deepClone(state.data),
        collapsed: deepClone(state.collapsed || {}),
      })
      const applySnapshot = (snap) => {
        state.data = deepClone(snap?.data || state.data)
        state.collapsed = deepClone(snap?.collapsed || {})
        state.selectedCells = []
        state.anchorCell = null
        state.activeRowId = null
        setDirty(true)
        render()
      }
      const resetHistory = () => {
        state.history.undo = []
        state.history.redo = []
        const u = document.getElementById('btnUndo')
        const r = document.getElementById('btnRedo')
        if (u) u.disabled = true
        if (r) r.disabled = true
      }
      const syncHistoryButtons = () => {
        const u = document.getElementById('btnUndo')
        const r = document.getElementById('btnRedo')
        if (u) u.disabled = state.history.undo.length === 0
        if (r) r.disabled = state.history.redo.length === 0
      }
      const pushHistory = () => {
        if (!state.data) return
        state.history.undo.push(snapshotState())
        if (state.history.undo.length > MAX_HISTORY) state.history.undo.shift()
        state.history.redo = []
        syncHistoryButtons()
      }
      const undo = () => {
        if (!state.history.undo.length) return
        const current = snapshotState()
        const prev = state.history.undo.pop()
        state.history.redo.push(current)
        applySnapshot(prev)
        syncHistoryButtons()
      }
      const redo = () => {
        if (!state.history.redo.length) return
        const current = snapshotState()
        const next = state.history.redo.pop()
        state.history.undo.push(current)
        if (state.history.undo.length > MAX_HISTORY) state.history.undo.shift()
        applySnapshot(next)
        syncHistoryButtons()
      }

      const getCell = (taskId, date) => {
        const key = `${taskId}::${date}`
        return state.data.cells[key] || { percent: 0, status: 'green' }
      }
      const setCell = (taskId, date, value) => {
        const key = `${taskId}::${date}`
        state.data.cells[key] = value
      }

      const ensureOneBlankRow = () => {
        if (state.data.tasks.length) return
        state.data.tasks.push({ id: uid(), title: '', owner: '', order: 0 })
      }

      const saveIndex = () => storage.setItem(STORAGE_INDEX, JSON.stringify(state.projects))
      const saveCurrentProject = () => {
        if (!state.current || !state.data) return
        const payload = JSON.stringify(state.data)
        storage.setItem(STORAGE_PREFIX + state.current, payload)
        setDirty(false)
      }

      const saveCurrentName = () => {
        if (!state.current) return
        storage.setItem(STORAGE_CURRENT, state.current)
      }

      const loadProject = (name) => {
        const raw = storage.getItem(STORAGE_PREFIX + name)
        if (!raw) {
          const startDate = todayIso()
          state.data = {
            board: { projectName: name, startDate, endDate: addDaysIso(startDate, 17) },
            tasks: [{ id: uid(), title: '', owner: '', order: 0 }],
            cells: {},
          }
          saveCurrentProject()
          return
        }
        try {
          state.data = JSON.parse(raw)
          if (!state.data || typeof state.data !== 'object') throw new Error('invalid project data')
          if (!state.data.board || typeof state.data.board !== 'object') state.data.board = {}
          if (!Array.isArray(state.data.tasks)) state.data.tasks = []
          if (!state.data.cells || typeof state.data.cells !== 'object') state.data.cells = {}
          state.data.board.projectName = name
          if (!state.data.board.startDate) state.data.board.startDate = todayIso()
          if (!state.data.board.endDate) state.data.board.endDate = state.data.board.startDate
          ensureOneBlankRow()
        } catch {
          const startDate = todayIso()
          state.data = {
            board: { projectName: name, startDate, endDate: addDaysIso(startDate, 17) },
            tasks: [{ id: uid(), title: '', owner: '', order: 0 }],
            cells: {},
          }
          saveCurrentProject()
        }
      }

      const orderedRows = () => {
        const rows = [...state.data.tasks].sort((a, b) => a.order - b.order)
        const isSub = (title) => String(title || '').trimStart().startsWith('↳')
        let parent = null
        const meta = rows.map((r) => {
          const sub = isSub(r.title)
          if (!sub) parent = r.id
          return { row: r, isSub: sub, parentId: sub ? parent : null }
        })
        const childrenCount = {}
        const childrenByParent = {}
        for (const r of meta) {
          if (r.isSub && r.parentId) {
            childrenCount[r.parentId] = (childrenCount[r.parentId] || 0) + 1
            ;(childrenByParent[r.parentId] ||= []).push(r.row.id)
          }
        }
        const visible = meta.filter((r) => !r.isSub || !state.collapsed[r.parentId])
        return { visible, childrenCount, childrenByParent }
      }

      const syncToggleAll = () => {
        const btn = document.getElementById('toggleAll')
        if (!btn) return
        const parents = [...state.data.tasks].sort((a, b) => a.order - b.order).filter((t) => !String(t.title || '').trimStart().startsWith('↳'))
        const anyCollapsed = parents.some((p) => state.collapsed[p.id] === true)
        btn.textContent = anyCollapsed ? '+' : '-'
      }

      const renderHeader = () => {
        const sel = document.getElementById('projectSelect')
        sel.innerHTML = state.projects.map((p) => `<option value="${p}">${p}</option>`).join('')
        sel.value = state.current || ''
        document.getElementById('startDate').value = state.data.board.startDate
        document.getElementById('endDate').value = state.data.board.endDate
      }

      const renderTable = () => {
        const dates = buildDates(state.data.board.startDate, state.data.board.endDate)
        const { visible, childrenCount, childrenByParent } = orderedRows()
        const rowIds = visible.map((x) => x.row.id)
        state.grid = { rows: rowIds, dates }
        document.getElementById('thead').innerHTML = `
          <tr>
            <th class="task-col">
              <div class="rowbox">
                <button class="toggle" id="toggleAll" type="button">-</button>
                <span>Task</span>
              </div>
              <span class="resizer" data-resize="task"></span>
            </th>
            <th class="owner-col">Tech owner<span class="resizer" data-resize="owner"></span></th>
            ${dates
              .map(
                (d, idx) =>
                  `<th class="date-col"><div class="colhdr"><div class="col-dow">${formatDow(d)}</div><div class="col-date">${formatDate(
                    d,
                  )}</div></div>${idx === 0 ? '<span class="resizer left" data-resize="calendar"></span>' : ''}</th>`,
              )
              .join('')}
          </tr>
        `
        const selected = new Set(state.selectedCells)

        const toAllowedPercent = (n) => {
          const v = Number(n)
          if (v >= 100) return 100
          if (v >= 75) return 75
          if (v >= 50) return 50
          if (v >= 25) return 25
          return 0
        }

        const aggregateForParent = (parentId, date) => {
          const kids = childrenByParent[parentId] || []
          if (!kids.length) return { percent: 0, status: 'green' }
          let sum = 0
          let cnt = 0
          const st = []
          for (const kidId of kids) {
            const c = getCell(kidId, date)
            const p = Number(c.percent || 0)
            if (p > 0) {
              sum += p
              cnt += 1
              st.push(c.status || 'green')
            }
          }
          const avg = cnt ? sum / cnt : 0
          const percent = toAllowedPercent(avg)
          let status = 'green'
          if (!cnt) status = 'green'
          else if (st.includes('red')) status = 'red'
          else if (st.includes('yellow')) status = 'yellow'
          else if (st.every((x) => x === 'black')) status = 'black'
          else status = 'green'
          return { percent, status }
        }

        const rows = visible
          .map(({ row, isSub }) => {
            const isParentWithKids = !isSub && !!childrenCount[row.id]
            const toggle = !isSub
              ? `<button class="toggle" data-toggle="${row.id}" ${childrenCount[row.id] ? '' : 'disabled'}>${state.collapsed[row.id] ? '+' : '-'}</button>`
              : `<span class="ghost"></span>`
            return `
              <tr data-id="${row.id}" class="${isParentWithKids ? 'parent-row' : ''}${state.activeRowId === row.id ? ' row-active' : ''}">
                <td class="task-col">
                  <div class="rowbox">
                    ${toggle}
                    <input class="row-input ${isSub ? 'sub' : ''}" data-title="${row.id}" value="${String(row.title || '').replaceAll('"', '&quot;')}" />
                    <div class="row-actions">
                      ${!isSub ? `<button class="icon" data-add-sub="${row.id}" title="Add subtask">+</button>` : ''}
                      <button class="icon drag" draggable="true" data-drag="${row.id}" title="Move">⋮⋮</button>
                      <button class="icon" data-dup="${row.id}" title="Duplicate">⧉</button>
                      <button class="icon" data-del="${row.id}" title="Delete">×</button>
                    </div>
                  </div>
                </td>
                <td class="owner-col">
                  <input class="row-input" data-owner="${row.id}" value="${String(row.owner || '').replaceAll('"', '&quot;')}" />
                </td>
                ${dates.map((d) => {
                  const c = isParentWithKids ? aggregateForParent(row.id, d) : getCell(row.id, d)
                  const k = `${row.id}::${d}`
                  return `<td class="cell-td date-td${selected.has(k) ? ' selected-td' : ''}"><button class="cell" ${isParentWithKids ? 'disabled data-readonly="1"' : ''} data-cell="${row.id}" data-date="${d}" title="${c.percent}% ${c.status}"><span class="ring">${ringSvg(c.percent, c.status)}</span></button></td>`
                }).join('')}
              </tr>
            `
          })
          .join('')
        document.getElementById('tbody').innerHTML = rows || `<tr><td colspan="${2 + dates.length}" class="empty">No rows</td></tr>`
        syncToggleAll()
      }

      const normalizeOrders = () => {
        state.data.tasks.sort((a, b) => a.order - b.order).forEach((t, i) => (t.order = i))
      }

      const render = () => {
        renderHeader()
        renderTable()
      }

      const bind = () => {
        const tableWrap = document.querySelector('.table-wrap')

        const applyZoom = () => {
          const z = Math.min(1.6, Math.max(0.6, state.zoom))
          state.zoom = z
          document.documentElement.style.setProperty('--zoom', String(z))
          document.getElementById('btnZoomReset').textContent = `${Math.round(z * 100)}%`
        }

        document.getElementById('btnZoomIn').addEventListener('click', () => {
          state.zoom = Math.round((state.zoom + 0.1) * 10) / 10
          applyZoom()
        })
        document.getElementById('btnZoomOut').addEventListener('click', () => {
          state.zoom = Math.round((state.zoom - 0.1) * 10) / 10
          applyZoom()
        })
        document.getElementById('btnZoomReset').addEventListener('click', () => {
          state.zoom = 1
          applyZoom()
        })

        document.getElementById('btnUndo').addEventListener('click', () => {
          undo()
        })
        document.getElementById('btnRedo').addEventListener('click', () => {
          redo()
        })
        document.addEventListener('keydown', (e) => {
          const z = e.code === 'KeyZ'
          const y = e.code === 'KeyY'
          if (!(z || y)) return
          if (!(e.ctrlKey || e.metaKey)) return
          const el = document.activeElement
          const tag = el?.tagName ? String(el.tagName).toUpperCase() : ''
          if (tag === 'INPUT' || tag === 'TEXTAREA' || el?.isContentEditable) return
          e.preventDefault()
          if (y) redo()
          else if (z && e.shiftKey) redo()
          else undo()
        })

        let isPanning = false
        let panStartX = 0
        let panStartY = 0
        let panScrollLeft = 0
        let panScrollTop = 0
        let spaceDown = false
        document.addEventListener('keydown', (e) => {
          if (e.code === 'Space') spaceDown = true
        })
        document.addEventListener('keyup', (e) => {
          if (e.code === 'Space') spaceDown = false
        })
        tableWrap.addEventListener('mousedown', (e) => {
          if (!spaceDown) return
          isPanning = true
          panStartX = e.clientX
          panStartY = e.clientY
          panScrollLeft = tableWrap.scrollLeft
          panScrollTop = tableWrap.scrollTop
          e.preventDefault()
        })
        document.addEventListener('mousemove', (e) => {
          if (!isPanning) return
          tableWrap.scrollLeft = panScrollLeft - (e.clientX - panStartX)
          tableWrap.scrollTop = panScrollTop - (e.clientY - panStartY)
        })
        document.addEventListener('mouseup', () => {
          isPanning = false
        })

        const startResize = (which, startX) => {
          const root = document.documentElement
          const getPx = (v) => Number(String(v || '').replace('px', '')) || 0
          const startTask = getPx(getComputedStyle(root).getPropertyValue('--taskW'))
          const startOwner = getPx(getComputedStyle(root).getPropertyValue('--ownerW'))
          const startDate = getPx(getComputedStyle(root).getPropertyValue('--dateW'))
          const start = which === 'task' ? startTask : which === 'owner' ? startOwner : startDate

          const onMove = (e) => {
            if (which === 'calendar') {
              const colCount = state.grid.dates.length || 1
              const dx = startX - e.clientX
              const nextDateW = Math.max(18, Math.min(120, start + dx / colCount))
              root.style.setProperty('--dateW', `${nextDateW}px`)
              return
            }

            const dx = e.clientX - startX
            const next = Math.max(40, Math.min(2200, start + dx))
            if (which === 'task') root.style.setProperty('--taskW', `${next}px`)
            else if (which === 'owner') root.style.setProperty('--ownerW', `${next}px`)
          }
          const onUp = () => {
            document.removeEventListener('mousemove', onMove)
            document.removeEventListener('mouseup', onUp)
          }
          document.addEventListener('mousemove', onMove)
          document.addEventListener('mouseup', onUp)
        }

        document.getElementById('thead').addEventListener('mousedown', (e) => {
          const r = e.target.closest('[data-resize]')
          if (!r) return
          const which = r.getAttribute('data-resize')
          startResize(which, e.clientX)
          e.preventDefault()
        })

        document.getElementById('thead').addEventListener('click', (e) => {
          const t = e.target.closest('#toggleAll')
          if (!t) return
          const anyExpanded = Object.values(state.collapsed).some((v) => v === true) === false
          const nextCollapsed = anyExpanded
          const rows = [...state.data.tasks].sort((a, b) => a.order - b.order)
          const isSub = (title) => String(title || '').trimStart().startsWith('↳')
          for (const r of rows) {
            if (!isSub(r.title)) state.collapsed[r.id] = nextCollapsed
          }
          renderTable()
        })

        document.getElementById('projectSelect').addEventListener('change', (e) => {
          const next = e.target.value
          if (!next || next === state.current) return
          if (state.dirty && !window.confirm('Hay cambios sin guardar. ¿Cambiar proyecto y descartarlos?')) {
            e.target.value = state.current
            return
          }
          state.current = next
          state.collapsed = {}
          state.selectedCells = []
          state.anchorCell = null
          loadProject(next)
          setDirty(false)
          saveCurrentName()
          resetHistory()
          render()
        })

        document.getElementById('startDate').addEventListener('change', (e) => {
          pushHistory()
          state.data.board.startDate = e.target.value
          if (state.data.board.endDate < state.data.board.startDate) state.data.board.endDate = state.data.board.startDate
          setDirty(true)
          render()
        })
        document.getElementById('endDate').addEventListener('change', (e) => {
          pushHistory()
          state.data.board.endDate = e.target.value
          if (state.data.board.endDate < state.data.board.startDate) state.data.board.startDate = state.data.board.endDate
          setDirty(true)
          render()
        })

        document.getElementById('btnCreate').addEventListener('click', () => {
          document.getElementById('createModal').style.display = 'grid'
          document.getElementById('newProjectName').focus()
        })
        document.getElementById('btnDelete').addEventListener('click', () => {
          const current = state.current
          if (!current) return
          if (!window.confirm(`Eliminar el proyecto "${current}"?`)) return
          storage.removeItem(STORAGE_PREFIX + current)
          state.projects = state.projects.filter((p) => p !== current)
          if (!state.projects.length) state.projects = ['Main_project']
          saveIndex()
          state.current = state.projects[0]
          saveCurrentName()
          state.collapsed = {}
          state.selectedCells = []
          state.anchorCell = null
          loadProject(state.current)
          setDirty(false)
          render()
        })
        document.getElementById('btnCancelCreate').addEventListener('click', () => {
          document.getElementById('createModal').style.display = 'none'
          document.getElementById('newProjectName').value = ''
        })
        document.getElementById('btnConfirmCreate').addEventListener('click', () => {
          const n = document.getElementById('newProjectName').value.trim()
          if (!n || forbiddenName.test(n)) {
            alert('Nombre no válido. No permitidos: espacio . , : |')
            return
          }
          if (state.projects.includes(n)) {
            alert('Ese proyecto ya existe.')
            return
          }
          state.projects.unshift(n)
          state.current = n
          saveIndex()
          saveCurrentName()
          state.data = {
            board: { projectName: n, startDate: todayIso(), endDate: addDaysIso(todayIso(), 17) },
            tasks: [{ id: uid(), title: '', owner: '', order: 0 }],
            cells: {},
          }
          state.collapsed = {}
          saveCurrentProject()
          document.getElementById('createModal').style.display = 'none'
          document.getElementById('newProjectName').value = ''
          state.selectedCells = []
          state.anchorCell = null
          render()
        })

        const cellKey = (taskId, date) => `${taskId}::${date}`
        const parseCellKey = (k) => {
          const [taskId, date] = String(k).split('::')
          return { taskId, date }
        }

        const isSubTitle = (title) => String(title || '').trimStart().startsWith('↳')
        const orderedAllTasks = () => [...state.data.tasks].sort((a, b) => a.order - b.order)

        const blockIdsFor = (rows, startId) => {
          const idx = rows.findIndex((r) => r.id === startId)
          if (idx === -1) return []
          const start = rows[idx]
          if (isSubTitle(start.title)) return [startId]
          const ids = [startId]
          for (let i = idx + 1; i < rows.length; i += 1) {
            if (!isSubTitle(rows[i].title)) break
            ids.push(rows[i].id)
          }
          return ids
        }

        const moveBlockBefore = (dragId, beforeId) => {
          if (!dragId || !beforeId) return
          if (dragId === beforeId) return
          const rows = orderedAllTasks()
          const byId = new Map(rows.map((r) => [r.id, r]))
          if (!byId.has(dragId) || !byId.has(beforeId)) return

          const blockIds = blockIdsFor(rows, dragId)
          if (!blockIds.length) return
          if (blockIds.includes(beforeId)) return

          const remaining = rows.filter((r) => !blockIds.includes(r.id))
          const insertIndex = remaining.findIndex((r) => r.id === beforeId)
          if (insertIndex === -1) return

          const block = blockIds.map((id) => byId.get(id)).filter(Boolean)
          const next = [...remaining.slice(0, insertIndex), ...block, ...remaining.slice(insertIndex)]
          next.forEach((t, i) => (t.order = i))
          state.data.tasks = next
          setDirty(true)
        }

        const selectRange = (from, to, additive) => {
          const rows = state.grid.rows
          const cols = state.grid.dates
          const r1 = rows.indexOf(from.taskId)
          const r2 = rows.indexOf(to.taskId)
          const c1 = cols.indexOf(from.date)
          const c2 = cols.indexOf(to.date)
          if (r1 === -1 || r2 === -1 || c1 === -1 || c2 === -1) return
          const rs = Math.min(r1, r2)
          const re = Math.max(r1, r2)
          const cs = Math.min(c1, c2)
          const ce = Math.max(c1, c2)
          const next = additive ? new Set(state.selectedCells) : new Set()
          for (let r = rs; r <= re; r += 1) {
            for (let c = cs; c <= ce; c += 1) next.add(cellKey(rows[r], cols[c]))
          }
          state.selectedCells = Array.from(next)
        }

        const updateSelection = (taskId, date, evt) => {
          const ctrl = evt.ctrlKey || evt.metaKey
          const shift = evt.shiftKey
          const key = cellKey(taskId, date)
          const current = { taskId, date }

          if (shift && state.anchorCell) {
            selectRange(state.anchorCell, current, ctrl)
            return { targets: null }
          }
          if (ctrl) {
            const set = new Set(state.selectedCells)
            if (set.has(key)) set.delete(key)
            else set.add(key)
            state.selectedCells = Array.from(set)
            state.anchorCell = current
            return { targets: null }
          }

          const set = new Set(state.selectedCells)
          if (set.size > 1 && set.has(key)) {
            return { targets: state.selectedCells.map(parseCellKey) }
          }
          state.selectedCells = [key]
          state.anchorCell = current
          return { targets: [current] }
        }

        document.getElementById('tbody').addEventListener('click', (e) => {
          const tr = e.target.closest('tr[data-id]')
          if (tr) {
            state.activeRowId = tr.getAttribute('data-id')
          } else {
            state.activeRowId = null
          }
          const t = e.target.closest('[data-toggle]')
          if (t) {
            const id = t.getAttribute('data-toggle')
            pushHistory()
            state.collapsed[id] = !state.collapsed[id]
            renderTable()
            return
          }

          const addSub = e.target.closest('[data-add-sub]')
          if (addSub) {
            const id = addSub.getAttribute('data-add-sub')
            const parent = state.data.tasks.find((x) => x.id === id)
            const parentOrder = parent ? parent.order : state.data.tasks.length - 1
            pushHistory()
            state.data.tasks.push({ id: uid(), title: '↳ ', owner: '', order: parentOrder + 0.1 })
            normalizeOrders()
            setDirty(true)
            renderTable()
            return
          }

          const dup = e.target.closest('[data-dup]')
          if (dup) {
            const id = dup.getAttribute('data-dup')
            const rows = orderedAllTasks()
            const idx = rows.findIndex((r) => r.id === id)
            if (idx === -1) return
            const src = rows[idx]
            let endIdx = idx
            if (!isSubTitle(src.title)) {
              while (endIdx + 1 < rows.length && isSubTitle(rows[endIdx + 1].title)) endIdx += 1
            }
            const afterOrder = rows[endIdx]?.order ?? src.order
            pushHistory()
            state.data.tasks.push({ ...src, id: uid(), order: afterOrder + 0.01 })
            setDirty(true)
            normalizeOrders()
            renderTable()
            return
          }

          const del = e.target.closest('[data-del]')
          if (del) {
            const id = del.getAttribute('data-del')
            pushHistory()
            state.data.tasks = state.data.tasks.filter((x) => x.id !== id)
            if (!state.data.tasks.length) state.data.tasks.push({ id: uid(), title: '', owner: '', order: 0 })
            normalizeOrders()
            setDirty(true)
            renderTable()
            return
          }

          const cell = e.target.closest('[data-cell]')
          if (cell) {
            const taskId = cell.getAttribute('data-cell')
            const date = cell.getAttribute('data-date')
            const { targets } = updateSelection(taskId, date, e)
            if (!targets) {
              renderTable()
              return
            }
            pushHistory()
            targets.forEach(({ taskId: tId, date: d }) => {
              const c = getCell(tId, d)
              const i = (percents.indexOf(c.percent) + 1) % percents.length
              setCell(tId, d, { percent: percents[i], status: c.status })
            })
            setDirty(true)
            renderTable()
            return
          }
        })

        let draggedRowId = null
        let dragOverRowId = null
        document.getElementById('tbody').addEventListener('dragstart', (e) => {
          const h = e.target.closest('[data-drag]')
          if (!h) return
          const tr = h.closest('tr[data-id]')
          const id = tr?.getAttribute('data-id')
          if (!id) return
          draggedRowId = id
          state.activeRowId = id
          e.dataTransfer?.setData('text/plain', id)
          if (e.dataTransfer) e.dataTransfer.effectAllowed = 'move'
        })
        document.getElementById('tbody').addEventListener('dragover', (e) => {
          if (!draggedRowId) return
          const tr = e.target.closest('tr[data-id]')
          const id = tr?.getAttribute('data-id')
          if (!id) return
          e.preventDefault()
          if (dragOverRowId && dragOverRowId !== id) {
            document.querySelector(`tr[data-id="${CSS.escape(dragOverRowId)}"]`)?.classList.remove('drag-over')
          }
          dragOverRowId = id
          tr.classList.add('drag-over')
          if (e.dataTransfer) e.dataTransfer.dropEffect = 'move'
        })
        document.getElementById('tbody').addEventListener('dragleave', (e) => {
          const tr = e.target.closest?.('tr[data-id]')
          const id = tr?.getAttribute?.('data-id')
          if (!id) return
          if (dragOverRowId === id) return
          tr.classList.remove('drag-over')
        })
        document.getElementById('tbody').addEventListener('drop', (e) => {
          if (!draggedRowId) return
          const tr = e.target.closest('tr[data-id]')
          const beforeId = tr?.getAttribute('data-id')
          e.preventDefault()
          if (dragOverRowId) {
            document.querySelector(`tr[data-id="${CSS.escape(dragOverRowId)}"]`)?.classList.remove('drag-over')
          }
          dragOverRowId = null
          if (beforeId) {
            pushHistory()
            moveBlockBefore(draggedRowId, beforeId)
            normalizeOrders()
            renderTable()
          }
          draggedRowId = null
        })
        document.getElementById('tbody').addEventListener('dragend', () => {
          if (dragOverRowId) {
            document.querySelector(`tr[data-id="${CSS.escape(dragOverRowId)}"]`)?.classList.remove('drag-over')
          }
          dragOverRowId = null
          draggedRowId = null
        })

        document.getElementById('tbody').addEventListener('contextmenu', (e) => {
          const cell = e.target.closest('[data-cell]')
          if (!cell) return
          e.preventDefault()
          const taskId = cell.getAttribute('data-cell')
          const date = cell.getAttribute('data-date')
          const { targets } = updateSelection(taskId, date, e)
          if (!targets) {
            renderTable()
            return
          }
          pushHistory()
          targets.forEach(({ taskId: tId, date: d }) => {
            const c = getCell(tId, d)
            const i = (statuses.indexOf(c.status) + 1) % statuses.length
            setCell(tId, d, { percent: c.percent, status: statuses[i] })
          })
          setDirty(true)
          renderTable()
        })

        document.getElementById('tbody').addEventListener('focusin', (e) => {
          const isTitle = e.target?.getAttribute?.('data-title')
          const isOwner = e.target?.getAttribute?.('data-owner')
          if (!isTitle && !isOwner) return
          const key = isTitle ? `title:${isTitle}` : `owner:${isOwner}`
          if (state.editingCell === key) return
          state.editingCell = key
          pushHistory()
        })
        document.getElementById('tbody').addEventListener('focusout', (e) => {
          const isTitle = e.target?.getAttribute?.('data-title')
          const isOwner = e.target?.getAttribute?.('data-owner')
          if (!isTitle && !isOwner) return
          state.editingCell = null
        })

        document.getElementById('tbody').addEventListener('input', (e) => {
          const title = e.target.getAttribute('data-title')
          if (title) {
            const t = state.data.tasks.find((x) => x.id === title)
            if (!t) return
            t.title = e.target.value
            setDirty(true)
            return
          }
          const owner = e.target.getAttribute('data-owner')
          if (owner) {
            const t = state.data.tasks.find((x) => x.id === owner)
            if (!t) return
            t.owner = e.target.value
            setDirty(true)
          }
        })

        document.addEventListener('mousedown', (e) => {
          const inside = e.target.closest('.table-wrap')
          if (!inside) {
            state.activeRowId = null
            renderTable()
          }
        })

        applyZoom()
      }

      const init = () => {
        let idx = []
        try {
          idx = JSON.parse(storage.getItem(STORAGE_INDEX) || '[]')
        } catch {}
        if (!Array.isArray(idx)) idx = []

        const scanned = []
        for (let i = 0; i < storage.length; i += 1) {
          const k = storage.key(i)
          if (!k || !k.startsWith(STORAGE_PREFIX)) continue
          scanned.push(k.slice(STORAGE_PREFIX.length))
        }

        const unique = new Set([...idx, ...scanned].filter((x) => typeof x === 'string' && x.length > 0))
        state.projects = Array.from(unique)
        if (!state.projects.length) state.projects = ['Main_project']
        saveIndex()

        const remembered = storage.getItem(STORAGE_CURRENT)
        state.current = remembered && state.projects.includes(remembered) ? remembered : state.projects[0]
        saveCurrentName()
        loadProject(state.current)
        setDirty(false)
        resetHistory()
        bind()
        render()
      }

      function bootstrapFromEmbedded() {
        const el = document.getElementById('tableaux-embedded')
        if (!el) return
        try {
          const embedded = JSON.parse(el.textContent || '{}')
          const projects = Array.isArray(embedded.projects) ? embedded.projects.filter((x) => typeof x === 'string') : []
          const current = typeof embedded.current === 'string' ? embedded.current : null
          const dataByProject = embedded.dataByProject && typeof embedded.dataByProject === 'object' ? embedded.dataByProject : {}

          const hasAnyData = projects.some((name) => !!dataByProject[name])
          if (!projects.length || !hasAnyData) return

          const existingIdx = (() => {
            try {
              const v = JSON.parse(storage.getItem(STORAGE_INDEX) || '[]')
              return Array.isArray(v) ? v.filter((x) => typeof x === 'string') : []
            } catch {
              return []
            }
          })()
          const scanned = []
          for (let i = 0; i < storage.length; i += 1) {
            const k = storage.key(i)
            if (!k || !k.startsWith(STORAGE_PREFIX)) continue
            scanned.push(k.slice(STORAGE_PREFIX.length))
          }

          const merged = []
          const seen = new Set()
          for (const name of [...projects, ...existingIdx, ...scanned]) {
            if (!name || typeof name !== 'string') continue
            if (seen.has(name)) continue
            seen.add(name)
            merged.push(name)
          }

          for (const name of projects) {
            const data = dataByProject[name]
            if (!data) continue
            const key = STORAGE_PREFIX + name
            if (!storage.getItem(key)) storage.setItem(key, JSON.stringify(data))
          }
          storage.setItem(STORAGE_INDEX, JSON.stringify(merged))
          if (current && merged.includes(current)) storage.setItem(STORAGE_CURRENT, current)
        } catch {}
      }

      const startApp = () => {
        bootstrapFromEmbedded()
        init()
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', startApp, { once: true })
      } else {
        startApp()
      }

      const importProjectJson = async (file) => {
        const text = await file.text()
        const data = JSON.parse(text)
        const name = data?.board?.projectName
        if (!name || typeof name !== 'string') {
          alert('El JSON no tiene board.projectName')
          return
        }
        if (forbiddenName.test(name)) {
          alert('El nombre del proyecto del JSON contiene caracteres no permitidos.')
          return
        }
        storage.setItem(STORAGE_PREFIX + name, JSON.stringify(data))
        state.projects = state.projects.filter((p) => p !== name)
        state.projects.unshift(name)
        saveIndex()
        state.current = name
        saveCurrentName()
        state.collapsed = {}
        state.selectedCells = []
        state.anchorCell = null
        loadProject(name)
        setDirty(false)
        render()
      }

      document.addEventListener('dragover', (e) => {
        e.preventDefault()
      })
      document.addEventListener('drop', async (e) => {
        e.preventDefault()
        const file = e.dataTransfer?.files?.[0]
        if (!file) return
        if (!String(file.name || '').toLowerCase().endsWith('.json')) return
        try {
          await importProjectJson(file)
        } catch {
          alert('No se pudo importar el JSON.')
        }
      })

      const toTimestamp = () => {
        const d = new Date()
        const pad = (n) => String(n).padStart(2, '0')
        return `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(
          d.getSeconds(),
        )}`
      }

      const downloadFile = (filename, text, mime) => {
        const blob = new Blob([text], { type: mime || 'text/plain;charset=utf-8' })
        const url = URL.createObjectURL(blob)
        const a = document.createElement('a')
        a.href = url
        a.download = filename
        document.body.appendChild(a)
        a.click()
        a.remove()
        URL.revokeObjectURL(url)
      }

      const saveJsonSnapshot = () => {
        saveCurrentProject()
        saveCurrentName()
        const name = state.current || 'project'
        downloadFile(`tableaux_${name}_${toTimestamp()}.json`, JSON.stringify(state.data, null, 2), 'application/json;charset=utf-8')
      }

      const saveHtmlSnapshot = () => {
        saveCurrentProject()
        saveCurrentName()

        const projects = state.projects.slice()
        const dataByProject = {}
        for (const name of projects) {
          const raw = storage.getItem(STORAGE_PREFIX + name)
          if (!raw) continue
          try {
            dataByProject[name] = JSON.parse(raw)
          } catch {}
        }
        const payload = {
          version: 1,
          exportedAt: new Date().toISOString(),
          current: state.current,
          projects,
          dataByProject,
        }

        const embeddedJson = JSON.stringify(payload).replace(/</g, '\\u003c')
        const src = document.documentElement.outerHTML
        try {
          const doc = new DOMParser().parseFromString(src, 'text/html')
          doc.querySelectorAll('#tableaux-embedded').forEach((el) => el.remove())
          const el = doc.createElement('script')
          el.id = 'tableaux-embedded'
          el.type = 'application/json'
          el.textContent = embeddedJson
          ;(doc.body || doc.documentElement).appendChild(el)
          downloadFile(`tableaux_${toTimestamp()}.html`, '<!doctype html>\n' + doc.documentElement.outerHTML, 'text/html;charset=utf-8')
        } catch {
          const scriptTag = `<script id="tableaux-embedded" type="application/json">${embeddedJson}<\\/script>`
          const i = src.toLowerCase().lastIndexOf('</body>')
          const html = i === -1 ? src : src.slice(0, i) + scriptTag + src.slice(i)
          downloadFile(`tableaux_${toTimestamp()}.html`, '<!doctype html>\n' + html, 'text/html;charset=utf-8')
        }
      }

      const saveModes = ['html', 'json', 'pdf']
      let saveMode = 'html'
      const saveModeLabel = (m) => (m === 'html' ? 'HTML' : m === 'json' ? 'JSON' : 'PDF')
      const renderSaveMode = () => {
        const b = document.getElementById('btnSaveMode')
        if (!b) return
        b.textContent = saveModeLabel(saveMode)
        b.setAttribute('data-mode', saveMode)
      }
      const cycleSaveMode = () => {
        const i = (saveModes.indexOf(saveMode) + 1) % saveModes.length
        saveMode = saveModes[i]
        renderSaveMode()
      }

      renderSaveMode()
      document.getElementById('btnSaveMode').addEventListener('click', () => {
        cycleSaveMode()
      })
      document.getElementById('btnSave').addEventListener('click', () => {
        if (saveMode === 'html') saveHtmlSnapshot()
        else if (saveMode === 'json') saveJsonSnapshot()
        else window.print()
      })
    </script>
  </body>
</html>
